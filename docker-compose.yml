services:
  backend:
    build: ./backend
    container_name: agt_backend
    volumes:
      - db_data:/data
    environment:
      DB_PATH: /data/taskflow.db
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    ports:
      - "4001:5000"
    restart: unless-stopped
    develop:
      watch:
        # Synchronise le code Python en temps réel sans reconstruire
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .venv/
            - instance/
        # Reconstruit l'image uniquement si vous installez une nouvelle dépendance
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build: ./frontend
    container_name: agt_frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        # Reconstruit automatiquement le bundle React+Vite pour Nginx dès que le code change
        - action: rebuild
          path: ./frontend/src
        # Reconstruit si vous ajoutez un paquet npm ou modifiez la config Vite
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/vite.config.js

volumes:
  db_data: